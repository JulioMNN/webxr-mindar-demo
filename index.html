<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WebXR Tag 17</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<!-- UI MENU -->
<div id="ui">
  <h2>Tag 17 XR Experience</h2>

  <button onclick="setMode('model')">3D Modell</button>
  <button onclick="setMode('video')">Video</button>
  <button onclick="setMode('info')">Info</button>

  <p id="status">Warte auf Auswahl...</p>
</div>

<!-- AR SCENE -->
<a-scene
  mindar-image="imageTargetSrc: assets/tag17.mind; autoStart: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  renderer="colorManagement: true; physicallyCorrectLights: true"
  id="scene"
>

  <a-assets>
    <a-asset-item id="model" src="models/model.glb"></a-asset-item>
    <video id="video" src="videos/demo.mp4" loop="true" crossorigin="anonymous"></video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0" id="anchor">

    <!-- 3D MODEL -->
    <a-entity
      id="modelEntity"
      gltf-model="#model"
      scale="0.4 0.4 0.4"
      position="0 0 0"
      visible="false"
    ></a-entity>

    <!-- VIDEO -->
    <a-video
      id="videoEntity"
      src="#video"
      width="1"
      height="0.6"
      position="0 0 0"
      visible="false"
    ></a-video>

    <!-- INFO PANEL -->
    <a-plane
      id="infoEntity"
      width="1.2"
      height="0.6"
      color="#222"
      opacity="0.8"
      position="0 0 0"
      visible="false"
    >
      <a-text
        value="Tag 17: WebXR Workflow\nQR → Browser → AR → Content"
        color="white"
        align="center"
        width="1.5"
      ></a-text>
    </a-plane>

  </a-entity>
</a-scene>

<script src="app.js"></script>
</body>
</html>
